name: Backend CI Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore TravelPlanner.Api/TravelPlanner.Api.csproj

      - name: Build
        run: dotnet build TravelPlanner.Api/TravelPlanner.Api.csproj --no-restore -c Release

      - name: Test
        run: dotnet test TravelPlanner.Tests/TravelPlanner.Tests.csproj --no-build -c Release
